# Dev cluster for k8sciv: 1 control plane + 3 workers spread across three
# synthetic zones so the zone-column map layout is visible. kind nodes carry
# no topology labels by default; we bake them in here.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8sciv
nodes:
  - role: control-plane
  - role: worker
    labels:
      topology.kubernetes.io/zone: z-a
  - role: worker
    labels:
      topology.kubernetes.io/zone: z-b
  - role: worker
    labels:
      topology.kubernetes.io/zone: z-c
