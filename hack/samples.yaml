# Sample workloads exercising every MVP surface: a healthy Deployment with
# a Service, an intentionally crash-looping Deployment, a StatefulSet with
# PVCs, a DaemonSet, and a PVC that can never bind (attention-queue demo).
apiVersion: v1
kind: Namespace
metadata:
  name: k8sciv-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: k8sciv-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: k8sciv-demo
spec:
  selector:
    app: web
  ports:
    - port: 80
---
# Ingress → web: the city's external gate (Ψ harbor + ∏ gate on its coast).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: k8sciv-demo
spec:
  rules:
    - host: web.k8sciv.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
---
# Crashes on purpose: enters CrashLoopBackOff within a minute of apply.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashy
  namespace: k8sciv-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crashy
  template:
    metadata:
      labels:
        app: crashy
    spec:
      containers:
        - name: boom
          image: busybox:1.36
          command: ["sh", "-c", "echo boom; sleep 3; exit 1"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: k8sciv-demo
spec:
  serviceName: db
  replicas: 2
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: k8sciv-demo
spec:
  clusterIP: None
  selector:
    app: db
  ports:
    - port: 80
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: agent
  namespace: k8sciv-demo
spec:
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      containers:
        - name: sleeper
          image: busybox:1.36
          command: ["sh", "-c", "sleep infinity"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
---
# Never binds: the storage class does not exist. Keeps one Warning in the
# attention queue so the panel is never empty in the demo.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stuck-pvc
  namespace: k8sciv-demo
spec:
  storageClassName: does-not-exist
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
# A one-shot Job that completes — an expedition (◈) on the demo island.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: k8sciv-demo
spec:
  completions: 1
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: busybox:1.36
          command: ["sh", "-c", "echo migrating; sleep 2"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
---
# A scheduled CronJob (◷) — a recurring caravan. Daily, so it won't spawn
# jobs during a demo; its schedule shows on the island.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly
  namespace: k8sciv-demo
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: report
              image: busybox:1.36
              command: ["sh", "-c", "echo nightly report"]
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
---
# Custom resources: projected onto the world map as island structures.
apiVersion: example.com/v1
kind: Gizmo
metadata:
  name: alpha-frobnicator
  namespace: k8sciv-demo
spec:
  power: 7
---
apiVersion: example.com/v1
kind: Gizmo
metadata:
  name: beta-frobnicator
  namespace: k8sciv-demo
spec:
  power: 3
