name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# No global `RUSTFLAGS: -D warnings`: the vendored miniquad (a PATH dependency,
# which loses the --cap-lints allow registry deps get) carries upstream's own
# pre-existing warnings — different per platform (the Linux x11/wayland backends
# compile files macOS never sees) — and a global -D would turn them into
# build/test errors. Warnings-as-errors on OUR crates is enforced by the clippy
# step's `-- -D warnings` argument (clippy includes the rustc lints), which
# scopes to workspace members only.
env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      # macroquad links X11 / GL / ALSA on Linux; needed even to build the test
      # binary (the tests themselves are pure and open no window). macOS uses
      # system frameworks — no install.
      - name: Install Linux GUI build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      # Mirrors `make lint`: the whole workspace (the bin pulls core with the
      # `oracle` feature, so this covers the egress path)…
      - name: Clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # …plus the headless core on its own (no `oracle` feature — the smoke gate's
      # build), so the no-egress path stays clippy-clean too.
      - name: Clippy (core, no features)
        run: cargo clippy -p kubernation-core --all-targets -- -D warnings

      # --locked so a stale Cargo.lock (e.g. a version bump not refreshed into the
      # lock) fails CI here, before the release job hits it with --locked.
      - name: Test
        run: cargo test --workspace --locked

      # The UI-free CI gate (the GUI's smoke needs a display, so it is a local-only
      # gate); this just proves the headless core example links + builds.
      - name: Build smoke example (headless core)
        run: cargo build -p kubernation-core --example smoke --locked

      # The vendored miniquad crash patches must actually be in the build. A
      # future macroquad upgrade that changes its `=0.4.10` pin makes cargo
      # silently IGNORE the [patch.crates-io] entry (a warning + [[patch.unused]]
      # only) — CI would stay green while both macOS crash fixes vanish. Fail
      # loudly instead.
      - name: Assert the vendored miniquad patch is active
        shell: bash
        # `[/\\]`: cargo tree prints the path with backslashes on Windows.
        run: |
          if ! cargo tree -p miniquad --depth 0 | grep -Eq 'third_party[/\\]miniquad'; then
            echo "::error::miniquad no longer resolves to third_party/miniquad — the vendored crash patches are NOT in the build (did a macroquad upgrade change its miniquad pin?). Re-vendor or drop the patch deliberately; see third_party/README.md."
            cargo tree -p miniquad --depth 0
            exit 1
          fi

  # The committed THIRD-PARTY-NOTICES.md must stay in sync with Cargo.lock — a
  # 1.0 legal posture can't silently drift (a new transitive crate with a new
  # license). Regenerate + diff; fail on any change.
  license-notices:
    name: third-party license notices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-about
        # cargo-about 0.9 moved its binary behind the `cli` feature, so a plain
        # install builds only the lib (no `cargo about` subcommand).
        run: cargo install --locked cargo-about --features cli
      - name: Regenerate + diff THIRD-PARTY-NOTICES.md
        # -B ignores blank-line-only differences: cargo-about renders one license's
        # body with a cosmetically different blank line across host OSes (same
        # version, same crate set). Any real change — a new/removed crate or
        # altered license wording — is a non-blank diff and still fails the guard.
        run: |
          cargo about generate about.hbs -o /tmp/notices.md
          if ! diff -uB crates/kubernation/THIRD-PARTY-NOTICES.md /tmp/notices.md; then
            echo "::error::THIRD-PARTY-NOTICES.md is stale — run: cargo about generate about.hbs -o crates/kubernation/THIRD-PARTY-NOTICES.md"
            exit 1
          fi
