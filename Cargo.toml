[package]
name = "k8sciv"
version = "0.1.0"
edition = "2024"
description = "K8sCiv — a Civilization-inspired Kubernetes TUI: the cluster as a living map"
license = "MIT OR Apache-2.0"

[dependencies]
ratatui = "0.30"
ratatui-crossterm = "0.1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
kube = { version = "3.1", features = ["client", "runtime"] }
k8s-openapi = { version = "0.27", features = ["v1_33"] }
futures = "0.3"
color-eyre = "0.6"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
toml = "0.9"
clap = { version = "4", features = ["derive"] }

[profile.release]
lto = "thin"
